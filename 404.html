<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://usagain.app/">
  <title>Not Found - Us Again</title>
  <style>
    * { box-sizing: border-box; }
    html {
      min-height: 100%;
      background: #f4eee5;
      color: #35251f;
      font-family: ui-rounded, "SF Pro Rounded", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px;
      background: #f4eee5;
    }
    main {
      width: min(620px, 100%);
      padding: 32px;
      border: 1px solid rgba(53, 37, 31, 0.14);
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.72);
    }
    h1 {
      margin: 0 0 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 2.4rem;
      line-height: 1.05;
    }
    p {
      margin: 0 0 22px;
      color: #765f55;
      line-height: 1.6;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 13px 20px;
      border-radius: 999px;
      background: #b4523d;
      color: #fffaf5;
      font-weight: 800;
      text-decoration: none;
    }
    a:hover,
    a:focus {
      background: #8f3e2f;
    }
  </style>
</head>
<body>
  <main>
    <h1>Not Found</h1>
    <p>This repo only hosts the Us Again promo page. Source paths, build files, private docs, and local artifacts are not published here.</p>
    <a href="https://usagain.app">Visit the official site</a>
  </main>
</body>
</html>
